<div class="p-6">
  
  <!-- Barre de recherche -->
  <div class="flex gap-2 mb-6">
    <div class="relative flex-1">
      <input type="text"
        [value]="query()"
        (input)="query.set($any($event).target.value)"
        (keyup.enter)="onSearch()"
        (focus)="showHistory.set(true)"
        (blur)="showHistory.set(false)"
        placeholder="Rechercher une vidéo..."
        class="w-full px-4 py-2 rounded-full bg-gray-800 text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-500 border border-gray-700" />
      @if (showHistory() && videoService.searchHistory().length > 0) {
        <ul class="absolute top-full z-10 w-full bg-gray-800 border border-gray-700 rounded-xl mt-1 shadow-lg overflow-hidden">
          @for (item of videoService.searchHistory(); track item) {
            <li (mousedown)="query.set(item); onSearch()"
                class="px-4 py-2 text-sm text-white hover:bg-gray-700 cursor-pointer">
              {{ item }}
            </li>
          }
        </ul>
      }
    </div>
    <button (click)="onSearch()"
      class="px-6 py-2 bg-red-600 text-white rounded-full hover:bg-red-500 font-semibold transition">
      Rechercher
    </button>
  </div>

  <!-- Loader -->
  @if (loading()) {
    <p class="text-center text-gray-500">Chargement...</p>
  }

  <!-- Résultats -->
  <div class="grid grid-cols-3 gap-4">
    @for (video of results(); track video.id.videoId) {
        <div class="bg-gray-800 rounded-xl overflow-hidden cursor-pointer hover:scale-105 transition-transform duration-200 shadow-lg">
            <img [routerLink]="['/video', video.id.videoId]" 
                [src]="video.snippet.thumbnails.medium.url" 
                [alt]="video.snippet.title" 
                class="w-full object-cover" />
            <div class="p-3">
                <p class="font-semibold text-sm text-white line-clamp-2" [innerHTML]="video.snippet.title"></p>
                <p class="text-xs text-gray-400 mt-1">{{ video.snippet.channelTitle }}</p>
                <button (click)="addToPlaylist(video)"
                    class="mt-3 w-full py-1.5 text-xs font-semibold bg-red-600 text-white rounded-lg hover:bg-red-500 transition">
                    + Ajouter à ma playlist
                </button>
            </div>
        </div>

    }
  </div>

</div>
